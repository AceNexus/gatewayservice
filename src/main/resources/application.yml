server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  application:
    name: gatewayservice
  lifecycle:
    timeout-per-shutdown-phase: 30s
  security:
    user:
      name: ${SECURITY_USERNAME}
      password: ${SECURITY_PASSWORD}
  reactor:
    context-propagation: auto   # 對所有 Reactor operator 啟用 context propagation，確保 MDC traceId/spanId 正確傳播

jwt:
  secret: ${JWT_SECRET}

# ==========================================
# 日誌設定
# ==========================================
logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%-5level) [%clr(%t){faint}] [%clr(%X{traceId:-}){magenta}] [%clr(%X{spanId:-}){blue}] [%clr(%logger){cyan}] %m%n%wEx"
  level:
    root: INFO
    org.springframework.security: WARN

# ==========================================
# Actuator
# ==========================================
management:
  endpoints:
    web:
      exposure:
        include: health,busrefresh
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.0}   # 預設關閉；Docker 部署在 .env 設 1.0 開啟
  otlp:
    tracing:
      endpoint: ${MANAGEMENT_OTLP_TRACING_ENDPOINT:http://tempo:4318/v1/traces}
